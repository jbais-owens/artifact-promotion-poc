name: Deploy DEV

# The single build boundary (ADR 017/026). Two modes, both via workflow_dispatch:
#   - Test deployment (input: ref)         → non-promotable, ephemeral.
#   - Release candidate (input: release-pr) → promotable; builds from the Release
#     PR head SHA, publishes canonical release-candidate.json (registry-anchored),
#     and associates it with the Release PR.
# RC creation is a deliberate, auditable release action — never a label side effect.
# A promotable RC may only be created from an OPEN Release PR that targets main.
# Everything beyond DEV promotes the digest recorded here; DEV state is never
# consulted for promotion.

on:
  workflow_dispatch:
    inputs:
      release-pr:
        description: Release PR number (Release Candidate deployment)
        required: false
        type: number
      ref:
        description: Branch/ref (Test deployment)
        required: false
        type: string

concurrency:
  # RC builds are keyed per Release PR (rebuilds allowed; a new build supersedes the
  # previous RC metadata for that PR). Test builds are keyed to their ref. The two
  # never share a group, so a test deploy cannot cancel an RC build.
  group: >-
    deploy-dev-${{ inputs.release-pr
      && format('rc-pr-{0}', inputs.release-pr)
      || format('test-{0}', inputs.ref) }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  resolve:
    name: Resolve mode + validate + apps
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.ctx.outputs.mode }}
      release-pr: ${{ steps.ctx.outputs.release_pr }}
      commit-sha: ${{ steps.ctx.outputs.sha }}
      apps: ${{ steps.apps.outputs.apps }}
      versions: ${{ steps.apps.outputs.versions }}
    steps:
      # Determine mode and, for RC, validate the Release PR and resolve its head SHA.
      # Fails fast if: neither/both inputs given; PR missing; PR closed; PR not
      # targeting main; head SHA unresolvable.
      - name: Resolve + validate context
        id: ctx
        uses: actions/github-script@v7
        env:
          RELEASE_PR: ${{ inputs.release-pr }}
          REF: ${{ inputs.ref }}
        with:
          script: |
            const prNum = (process.env.RELEASE_PR || '').trim();
            const ref = (process.env.REF || '').trim();
            if (prNum && ref) return core.setFailed('Provide either release-pr or ref — not both.');
            if (!prNum && !ref) return core.setFailed('Provide release-pr (Release Candidate) or ref (Test deployment).');

            if (!prNum) {
              // Test deployment — no Release PR, never promotable.
              core.setOutput('mode', 'test');
              core.setOutput('release_pr', '');
              core.setOutput('sha', ref);
              return;
            }

            // Release Candidate — validate the open Release PR targeting main.
            let pr;
            try {
              pr = await github.rest.pulls.get({
                owner: context.repo.owner, repo: context.repo.repo, pull_number: Number(prNum),
              });
            } catch (e) {
              return core.setFailed(`Release PR #${prNum} does not exist (${e.status || 'error'}).`);
            }
            if (pr.data.state !== 'open') return core.setFailed(`Release PR #${prNum} is ${pr.data.state}; a promotable RC requires an OPEN Release PR.`);
            if (pr.data.base.ref !== 'main') return core.setFailed(`Release PR #${prNum} targets '${pr.data.base.ref}', not 'main'.`);
            const sha = pr.data.head.sha;
            if (!sha) return core.setFailed(`Could not resolve the head SHA of Release PR #${prNum}.`);

            core.setOutput('mode', 'release-candidate');
            core.setOutput('release_pr', prNum);
            core.setOutput('sha', sha);

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.ctx.outputs.sha }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Resolve app set + build versions
        id: apps
        env:
          MODE: ${{ steps.ctx.outputs.mode }}
          RUN: ${{ github.run_number }}
        run: |
          set -euo pipefail
          deployable="$(jq -c '.release.groups.apps.projects // []' nx.json)"

          if [ "$MODE" = "release-candidate" ]; then
            # Affected relative to main (the Release PR base), computed explicitly so
            # it is correct under workflow_dispatch (no PR event context).
            git fetch --no-tags --depth=0 origin main >/dev/null 2>&1 || git fetch --no-tags origin main
            NX_BASE="$(git merge-base origin/main HEAD)"
            NX_HEAD="$(git rev-parse HEAD)"
            export NX_BASE NX_HEAD
            affected="$(pnpm nx show projects --type app --affected --json)"
            apps="$(jq -cn --argjson a "$affected" --argjson d "$deployable" '$a | map(select(IN($d[])))')"
          else
            # Test deployment builds the full deployable set for the given ref.
            apps="$deployable"
          fi

          # Best-effort build versions from nx (dry-run parse). Documented assumption:
          # falls back to 0.0.0 if nx cannot resolve a baseline.
          versions='{}'
          for app in $(echo "$apps" | jq -r '.[]'); do
            base="$(pnpm nx release version --dry-run --projects="$app" 2>/dev/null \
              | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)"
            [ -z "$base" ] && base="0.0.0"
            versions="$(jq -c --arg a "$app" --arg v "${base}-rc.${RUN}" '. + {($a): $v}' <<<"$versions")"
          done

          echo "apps=$apps" >> "$GITHUB_OUTPUT"
          echo "versions=$versions" >> "$GITHUB_OUTPUT"
          echo "Mode: $MODE"; echo "Apps: $apps"; echo "Versions: $versions"

  build:
    name: Build + push (${{ matrix.app }})
    needs: resolve
    if: needs.resolve.outputs.apps != '[]' && needs.resolve.outputs.apps != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.resolve.outputs.apps) }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.resolve.outputs.commit-sha }}

      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image ref + build version
        id: meta
        env:
          VERSIONS: ${{ needs.resolve.outputs.versions }}
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${REGISTRY}/${owner}/${{ matrix.app }}" >> "$GITHUB_OUTPUT"
          echo "short=$(echo '${{ needs.resolve.outputs.commit-sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r --arg a '${{ matrix.app }}' '.[$a] // "0.0.0-rc.0"' <<<"$VERSIONS")" >> "$GITHUB_OUTPUT"

      # Build ONCE here; every later environment promotes this digest unchanged.
      - name: Build + push ${{ matrix.app }}
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short }}
          labels: |
            org.opencontainers.image.revision=${{ needs.resolve.outputs.commit-sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            fe3.release-pr=${{ needs.resolve.outputs.release-pr }}
            fe3.promotable=${{ needs.resolve.outputs.mode == 'release-candidate' }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Emit per-app metadata part
        run: |
          set -euo pipefail
          jq -cn \
            --arg name '${{ matrix.app }}' \
            --arg image '${{ steps.meta.outputs.image }}' \
            --arg digest '${{ steps.build.outputs.digest }}' \
            --arg buildVersion '${{ steps.meta.outputs.version }}' \
            '{name:$name, image:$image, digest:$digest, buildVersion:$buildVersion}' \
            > "part-${{ matrix.app }}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: rc-part-${{ matrix.app }}
          path: part-${{ matrix.app }}.json
          retention-days: 7

  assemble:
    name: Assemble metadata + record DEV deployment
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: rc-part-*
          merge-multiple: true
          path: parts

      - name: Build release-candidate.json
        id: rc
        env:
          MODE: ${{ needs.resolve.outputs.mode }}
          RELEASE_PR: ${{ needs.resolve.outputs.release-pr }}
          SHA: ${{ needs.resolve.outputs.commit-sha }}
          RUN: ${{ github.run_number }}
        run: |
          set -euo pipefail
          apps="$(jq -cs '.' parts/part-*.json)"
          promotable=$([ "$MODE" = "release-candidate" ] && echo true || echo false)
          deployment_id="$(date -u +%Y-%m-%d)-${RUN}"
          jq -n \
            --argjson releasePr "${RELEASE_PR:-null}" \
            --arg commitSha "$SHA" \
            --argjson promotable "$promotable" \
            --arg deploymentId "$deployment_id" \
            --argjson applications "$apps" \
            '{schemaVersion:1, releasePr:$releasePr, commitSha:$commitSha,
              promotable:$promotable, deploymentId:$deploymentId, applications:$applications}' \
            > release-candidate.json
          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"
          cat release-candidate.json

      # Canonical, immutable, PR-addressable store (hybrid design). Only RC builds
      # publish it; test builds never mint promotable metadata. A new RC push for the
      # same PR supersedes the previous metadata at the pr-<n> tag.
      - name: Setup oras (RC only)
        if: needs.resolve.outputs.mode == 'release-candidate'
        uses: oras-project/setup-oras@v1
      - name: Publish release-candidate.json to registry (RC only)
        if: needs.resolve.outputs.mode == 'release-candidate'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PR: ${{ needs.resolve.outputs.release-pr }}
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "${GITHUB_TOKEN}" | oras login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          oras push "ghcr.io/${owner}/fe3-release-candidates:pr-${RELEASE_PR}" \
            --artifact-type application/vnd.fe3.release-candidate+json \
            release-candidate.json:application/json

      # Non-promotable record for test deployments (audit only).
      - name: Upload test-deployment metadata (test only)
        if: needs.resolve.outputs.mode == 'test'
        uses: actions/upload-artifact@v4
        with:
          name: dev-test-metadata
          path: release-candidate.json
          retention-days: 7

      # Native DEV deployment record (environment history + PR visibility, keyed to
      # the commit SHA). Actual rollout is DevOps-owned — placeholder below.
      - name: Record DEV deployment
        uses: actions/github-script@v7
        env:
          SHA: ${{ needs.resolve.outputs.commit-sha }}
          MODE: ${{ needs.resolve.outputs.mode }}
          RELEASE_PR: ${{ needs.resolve.outputs.release-pr }}
        with:
          script: |
            const sha = process.env.SHA;
            const promotable = process.env.MODE === 'release-candidate';
            const dep = await github.rest.repos.createDeployment({
              owner: context.repo.owner, repo: context.repo.repo, ref: sha,
              environment: 'dev', auto_merge: false, required_contexts: [],
              transient_environment: !promotable,
              payload: { promotable, releasePr: process.env.RELEASE_PR || null },
              description: promotable ? 'Release candidate' : 'Test deployment (ephemeral)',
            });
            // Placeholder: DevOps performs the actual DEV rollout of the digest.
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner, repo: context.repo.repo,
              deployment_id: dep.data.id, state: 'success',
              description: 'Image built + pushed at the DEV build boundary.',
            });
