name: Promote

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment
        required: true
        type: choice
        options:
          - sit
          - uat
          - pentest
          - prod

permissions:
  actions: read

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Download RC
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SLUG=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')

          ID=$(gh api \
            "repos/${{ github.repository }}/actions/artifacts?name=rc-${SLUG}&per_page=1" \
            --jq '.artifacts[0].id')

          gh api \
            "repos/${{ github.repository }}/actions/artifacts/${ID}/zip" \
            > rc.zip

          unzip rc.zip

      - name: Show RC
        run: cat rc.txt

      - name: Promote
        run: |
          echo "Promoting to ${{ inputs.environment }}"
